name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Lint, Test and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (required for Android / general Flutter tooling)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Linting (flutter analyze)
        run: flutter analyze

      - name: Run Unit & Widget Tests
        run: flutter test

      - name: Run Security Scan (OSV-Scanner)
        uses: google/osv-scanner-action/bootstrap-action@v1
        with:
          scan-args: --recursive ./
